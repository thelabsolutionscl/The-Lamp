name: the_lamp
description: Smart lighting control compatible with Magic Home hardware
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # BLE
  flutter_blue_plus: ^1.32.12

  # Permissions
  permission_handler: ^11.3.1

  # Network info (get local IP / subnet)
  network_info_plus: ^5.0.3

  # Persistence
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
